name: Wiki README Auto-Update & Function Scope Verification

on:
  push:
    paths:
      - 'Documentation/wiki/*.md'
      - 'client/_functions.lua'
      - 'server/_functions.lua'
      - 'shared/**/*.lua'
      - '.github/workflows/wiki-sync.yml'
    branches:
      - main

  pull_request:
    paths:
      - 'Documentation/wiki/*.md'
      - 'client/_functions.lua'
      - 'server/_functions.lua'
      - 'shared/**/*.lua'

jobs:
  verify-function-scopes:
    runs-on: ubuntu-latest
    name: Verify Function Scopes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run function scope verification
        run: python3 scripts/verify_function_scopes.py --verbose
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Upload mismatch report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: function_scope_mismatches
          path: scripts/function_scope_mismatches.json

  auto-fix-scopes:
    runs-on: ubuntu-latest
    name: Auto-fix scope markers
    needs: verify-function-scopes
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Auto-fix scope markers
        id: fix
        run: |
          python3 scripts/verify_function_scopes.py --fix --verbose
          if git diff --quiet; then
            echo "CHANGES_MADE=false" >> $GITHUB_OUTPUT
          else
            echo "CHANGES_MADE=true" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Create PR with fixes
        if: steps.fix.outputs.CHANGES_MADE == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'docs: auto-fix function scope markers in README'
          title: 'docs: auto-fix function scope markers in README'
          body: |
            This PR automatically fixes function scope markers ([S], [C], [S C]) in the README to match the actual code implementation.

            **Changes made:**
            - Updated scope markers based on actual function locations
            - Detected IsDuplicityVersion() checks for dual-scope functions
            - Verified all markers accurately reflect implementation

            The verification script detected mismatches and automatically corrected them.

            ⚠️ **Please review** to ensure all changes are correct.
          branch: docs/auto-fix-scopes
          delete-branch: true
          labels: documentation, automated

  update-readme:
    runs-on: ubuntu-latest
    name: Update README with new exports
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Auto-detect and update new exports
        id: update
        run: |
          set +e
          python3 scripts/update_readme_exports.py
          code=$?
          set -e
          if [ $code -eq 1 ]; then
            echo "CHANGES_DETECTED=true" >> $GITHUB_OUTPUT
          else
            echo "CHANGES_DETECTED=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Create or update PR with changes
        if: steps.update.outputs.CHANGES_DETECTED == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'docs: auto-update README with new function exports'
          title: 'docs: auto-update README with new function exports'
          body: |
            This PR automatically updates the README.md with newly detected function exports and updates function scope markers based on code analysis.

            **Changes made:**
            - Detected new export functions and documentation files
            - Updated function scope markers ([S], [C], [S C]) based on actual code locations
            - Verified that all markers accurately reflect where functions are defined

            ⚠️ **Please review** to ensure all changes are correct.
          branch: docs/auto-update-readme
          delete-branch: true
          labels: documentation, automated

  comment-pr:
    runs-on: ubuntu-latest
    name: Comment scope verification results on PR
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run verification and generate report
        id: verify
        run: |
          # Check if there were mismatches by exit code
          if python3 scripts/verify_function_scopes.py --verbose > /tmp/verify_output.txt 2>&1; then
            echo "HAS_MISMATCHES=false" >> $GITHUB_OUTPUT
          else
            echo "HAS_MISMATCHES=true" >> $GITHUB_OUTPUT
          fi
          
          cat /tmp/verify_output.txt
        continue-on-error: true
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Comment PR with results
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/verify_output.txt', 'utf8');
            const hasMismatches = '${{ steps.verify.outputs.HAS_MISMATCHES }}' === 'true';
            
            let body = `## 📋 Function Scope Verification\n\n`;
            
            if (hasMismatches) {
              body += `⚠️ **Scope mismatches detected!**\n\n`;
              body += `The following functions have incorrect scope markers in the README.\n\n`;
              body += `**To fix automatically:**\n\`\`\`bash\npython3 scripts/verify_function_scopes.py --fix\n\`\`\`\n\n`;
            } else {
              body += `✅ **All scope markers are correct!**\n\n`;
            }
            
            body += `<details>\n<summary>Detailed Report</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  create-issues:
    runs-on: ubuntu-latest
    name: Create issues for missing scopes
    needs: verify-function-scopes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Download mismatch report
        uses: actions/download-artifact@v4
        with:
          name: function_scope_mismatches
          path: scripts
        continue-on-error: true

      - name: Install GitHub CLI
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate gh CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Create issues from mismatch report
        run: |
          if [ -f scripts/function_scope_mismatches.json ]; then
            python3 scripts/create_missing_docs_issues.py --auto-create --yes --repo "${{ github.repository }}"
          else
            echo "No mismatch report found; skipping issue creation."
          fi
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
