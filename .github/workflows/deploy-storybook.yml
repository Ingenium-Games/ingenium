name: Deploy Storybook

on:
  push:
    branches:
      - main
    paths:
      - 'nui/**'
      - '.github/workflows/deploy-storybook.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'nui/package-lock.json'

      - name: Print environment info
        run: |
          node --version
          npm --version

      - name: Install dependencies
        working-directory: ./nui
        run: npm ci || npm install

      - name: Generate Storybook stories
        working-directory: ./nui
        run: node scripts/generate-storybook-stories.js

      - name: Build Storybook
        working-directory: ./nui
        run: npm run build-storybook -- --debug-webpack --loglevel verbose

      - name: Verify build output
        run: |
          if [ ! -d "storybook-static" ]; then
            echo "Error: storybook-static directory not found"
            exit 1
          fi
          ls -la storybook-static/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: storybook-static
          token: ${{ secrets.GITHUB_TOKEN }}