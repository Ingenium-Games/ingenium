name: Build and deploy Storybook to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: nui/package-lock.json

      - name: Install dependencies
        working-directory: ./nui
        run: npm ci

      - name: Generate Storybook stories for NUI components
        working-directory: ./nui
        run: node scripts/generate-storybook-stories.js

      - name: Build Storybook
        working-directory: ./nui
        run: npm run build-storybook

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          publish_branch: gh-pages
