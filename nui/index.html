<!DOCTYPE html>
<html>

<head>
  <!-- Head -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- GTAV Jquery -->
  <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
  <!-- Adding some Useful Libs -->
  <script src="libs/jquery-3.6.0.min.js" type="text/javascript"></script>
  <script src="libs/jquery.mask.min.js" type="text/javascript"></script>
  <script src="libs/jquery.validate.min.js" type="text/javascript"></script>
  
  <!--CSS-->
  <link href="css/_c.css" rel="stylesheet" type="text/css" />
  <link href="css/character-select.css" rel="stylesheet" type="text/css" />
  <link href="inventory/dist/assets/index.css" rel="stylesheet" type="text/css" />

  <!--JS-->
  <script src="js/_c.js" type="text/javascript"></script>
  <script src="js/character-select.js" type="text/javascript"></script>
  <script type="module" src="inventory/dist/assets/index.js"></script>

  <!-- /Head -->
</head>

<body>
  <!-- .character-select -->
  <div class="character-select">
    <div class="character-select-info" style="display: inline">
      <div class="character-select-information">
        <h1>Character Information</h1>
        <br />
        <h3>Name:</h3>
        <p class="character-select-information-name"></p>
        <h3>Created on:</h3>
        <p class="character-select-information-created"></p>
        <h3>Last played:</h3>
        <p class="character-select-information-lastseen"></p>
        <h3>City ID:</h3>
        <p class="character-select-information-city"></p>
        <h3>Phone Number:</h3>
        <p class="character-select-information-phone"></p>
        <br />
      </div>
    </div>
    <div class="character-select-options" style="display: inline">
      <a class="character-select-play tooltip" style="display: inline"><img src="img/icons8-exit-sign-96.png" /> <span class="tooltiptext">Enter</span></a>
      <a class="character-select-kill tooltip" style="display: inline"><img src="img/icons8-remove-96.png" /> <span class="tooltiptext">Delete</span></a>
    </div>
    <div class="character-select-list" style="display: inline">
      <div class="character-select-row">
        <a class="character-select-new character-select-character tooltip" onclick="character_select_selected('New');"><img src="img/icons8-team-96.png" /><span class="tooltiptext">New</span></a>
      </div>
    </div>
    <form class="character-select-make" style="display: none" autocomplete="off">
      <fieldset class="character-select-feildset">
        <p>First Name</p>
        <input name="FirstName" id="FirstName" placeholder="-" pattern="[A-Z/a-z]{1,25}" minlength="2" maxlength="25"
          type="text" required />
        <p>Last Name</p>
        <input name="LastName" id="LastName" placeholder="-" pattern="[A-Z/a-z]{1,25}" minlength="2" maxlength="25"
          type="text" required />
        <br />
        <br />
        <br />
        <input class="character-select-submit" type="submit" value="Create" />
        <br />
        <br />
        <br />
      </fieldset>
    </form>
  </div>
  <!-- .character-select -->

  <!-- .notification-window -->
  <div class="notification-window"></div>
  <!-- .notification-window -->

  <!-- .inventory-container (Vue App) -->
  <div id="inventory-app"></div>
  <!-- .inventory-container -->

</body>

</html>
