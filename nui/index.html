<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
    <!--CSS-->
    <link href="css/_c.css" rel="stylesheet" type="text/css" />
    <link href="css/character-select.css" rel="stylesheet" type="text/css" />
    <!--JS-->
    <script src="js/_c.js" type="text/javascript"></script>
    <script src="js/character-select.js" type="text/javascript"></script>
    <!--Adding some Useful Libs-->
    <!--<script src="libs/jquery-3.6.0.min.js" type="text/javascript"></script>-->
    <script src="libs/jquery.mask.min.js" type="text/javascript"></script>
    <script src="libs/jquery.validate.min.js" type="text/javascript"></script>

</head>
<body id="body">
    <!-- .character-select -->
    <div class="character-select">
    <div class="character-select-info" style="display: none;">
        <div class="character-select-information">
            <h1>Character Information</h1>
            <br />
            <h3>Name:</h3>
            <p class="character-select-name"></p>
            <h3>Created on:</h3>
            <p class="character-select-created"></p>
            <h3>Last played:</h3>
            <p class="character-select-lastseen"></p>
            <h3>City ID:</h3>
            <p class="character-select-city"></p>
            <h3>Phone Number:</h3>
            <p class="character-select-phone"></p>
            <br />
        </div>
    </div>
    <div class="character-select-options" style="display: none;">
        <a class="character-select-play" class="character-select-selector character-select-character tooltip" onclick="CharacterJoin();" style="display: none;"><img src="img/icons8-exit-sign-96.png" /><span class="tooltiptext">Enter</span></a>
        <a class="character-select-kill" class="character-select-selector character-select-character tooltip" onclick="CharacterDelete();"style="display: none;"><img src="img/icons8-remove-96.png" /><span class="tooltiptext">Delete</span></a>
    </div>
    <div class="character-select-list" style="display: none;">
        <div class="character-select-row">
            <a id="New" class="character-select-new" class="character-select-character tooltip"onclick="Selected('New');"><img src="img/icons8-team-96.png" /><span class="tooltiptext">New</span></a>
        </div>
    </div>
    <form class="character-select-make" style="display: none;" autocomplete="off">
        <fieldset class="character-select-feildset">
            <p>First Name</p>
            <input name="FirstName" id="FirstName" placeholder="-" pattern="[A-Z/a-z]{1,25}" minlength="2" maxlength="25" type="text" required>
            <p>Last Name</p>
            <input name="LastName" id="LastName" placeholder="-" pattern="[A-Z/a-z]{1,25}" minlength="2" maxlength="25" type="text" required>
            <br />
            <br />
            <br />
            <input class="submit" type="submit" value="Create">
            <br />
            <br />
            <br />
        </fieldset>
    </form>
    </div>
    <!-- .character-select -->
</body>
</html>
